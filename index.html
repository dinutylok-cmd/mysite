<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e11;
            color: #ffffff;
            font-family: 'Consolas', 'Monaco', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            flex-direction: row; /* Строго в ряд */
            align-items: center;
            gap: 40px; 
            margin-top: -10vh;
        }

        .text-block {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .line {
            font-size: 18px;
            line-height: 1.8;
            white-space: nowrap;
        }

        .key {
            color: #58a6ff;
            margin-right: 10px;
        }

        .avatar-container {
            flex-shrink: 0; /* Чтобы фотку не сжимало */
        }

        .avatar {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border: 1px solid #30363d;
            display: block;
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: #58a6ff;
            margin-left: 5px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="text-block">
            <div class="line"><span class="key">NAME:</span><span class="value">твой ник</span></div>
            <div class="line"><span class="key">STATUS:</span><span class="value">active</span></div>
            <div class="line"><span class="key">INFO:</span><span class="value">здесь твоя инфа</span></div>
            <div class="line"><span class="key">SKILLS:</span><span class="value">python / c++ / steam</span></div>
            <div class="line"><span class="key">LOC:</span><span class="value">earth</span></div>
            <div class="line"><span class="value">любая рандомная строка</span><span class="cursor"></span></div>
        </div>

        <div class="avatar-container">
            <img src="1000878476.jpg" alt="avatar" class="avatar">
        </div>
    </div>

</body>
</html>
